name: CLA Assistant
on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: (github.event.comment.body == 'recheck' || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') || github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/adamjgmiller/worktreehq/blob/main/CLA.md'
          branch: 'main'
          allowlist: 'bot*,dependabot*,adamjgmiller'
          remote-organization-name: false
          remote-repository-name: false
          create-file-commit-message: 'chore: create CLA signature file'
          signed-commit-message: 'chore: $contributorName signed the CLA'
          custom-notsigned-prcomment: |
            Thanks for your pull request! Before we can merge it, you need to
            sign our [Contributor License Agreement](https://github.com/adamjgmiller/worktreehq/blob/main/CLA.md).

            To sign, please reply to this comment with:

            `I have read the CLA Document and I hereby sign the CLA`

            ---
            This is a one-time requirement. Once signed, all your future
            contributions are covered.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA.'
          lock-pullrequest-aftermerge: false
          use-dco-flag: false
